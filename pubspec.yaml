name: ahlulbayt_companion
description: The world's most complete free Shia Muslim companion app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Animation
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.2
  lottie: ^3.1.2

  # Navigation & State
  go_router: ^17.1.0
  provider: ^6.1.2

  # Firebase
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  cloud_firestore: ^6.1.3

  # AdMob
  google_mobile_ads: ^7.0.0

  # Islamic & Prayer
  flutter_qiblah: ^3.2.0
  hijri: ^3.0.0

  # Audio
  just_audio: ^0.10.5
  audio_session: ^0.2.3

  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Localisation
  easy_localization: ^3.0.7

  # Networking
  http: ^1.2.2

  # Utilities
  intl: ^0.20.2
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  screenshot: ^3.0.0
  flutter_dotenv: ^6.0.0
  webview_flutter: ^4.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/adhan/
    - assets/audio/duas/
    - assets/audio/quran/
    - assets/lottie/
    - assets/data/
    - assets/translations/
    - .env
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
